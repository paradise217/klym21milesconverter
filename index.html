<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f9f8f6;--surface:#ffffff;--surface2:#f2f1ef;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --text:#1a1a1a;--text2:#5a5a5a;--text3:#999;
    --green:#1a7a4a;--green-bg:#e8f5ee;
    --amber:#8a5a00;--amber-bg:#fef3dc;
    --red:#b83232;--red-bg:#fdeaea;
    --blue:#1a4a8a;--blue-bg:#e8eef8;
    --radius:10px;--radius-sm:6px;
  }
  [data-theme="dark"] {
    --bg:#111110;--surface:#1c1c1b;--surface2:#252524;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#f0ede8;--text2:#a09d98;--text3:#5a5755;
    --green:#4ade80;--green-bg:#0d2818;
    --amber:#fbbf24;--amber-bg:#281a00;
    --red:#f87171;--red-bg:#280d0d;
    --blue:#93c5fd;--blue-bg:#0d1a28;
  }
  [data-theme="dark"] .tag-cason{background:#0d1a33;color:#93c5fd}
  [data-theme="dark"] .tag-ellerie{background:#1a0d2e;color:#d8b4fe}
  [data-theme="dark"] input,[data-theme="dark"] select{background:var(--surface2);border-color:var(--border2);color:var(--text)}
  [data-theme="dark"] .btnp{background:#f0ede8;color:#111110;border-color:#f0ede8}
  [data-theme="dark"] .btnp:hover{background:#d8d4ce;border-color:#d8d4ce}
  [data-theme="dark"] .nb.active{background:#f0ede8;color:#111110;border-color:#f0ede8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 2.25rem;width:100%;max-width:380px}
  .login-title{font-size:1.3rem;font-weight:normal;letter-spacing:-.02em;margin-bottom:.35rem}
  .login-sub{font-size:13px;color:var(--text3);margin-bottom:1.5rem}
  .login-field{margin-bottom:12px}
  .login-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'SF Mono','Fira Code',monospace;margin-bottom:4px;display:block}
  .login-err{border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;margin-bottom:12px;display:none}
  .login-err.show{display:block}
  .login-err.err{background:var(--red-bg);color:var(--red)}
  .login-err.ok{background:var(--green-bg);color:var(--green)}
  .login-mode{font-size:12px;color:var(--text3);margin-top:12px;text-align:center}
  .login-mode a{color:var(--blue);cursor:pointer}
  .app{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .app-header{margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  .app-title{font-size:1.5rem;font-weight:normal;letter-spacing:-.02em}
  .app-title span{color:var(--text3);font-size:.9rem;font-family:'SF Mono','Fira Code',monospace}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .user-pill{font-size:11px;color:var(--text3);font-family:'SF Mono','Fira Code',monospace;padding:3px 10px;border:1px solid var(--border);border-radius:20px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sync-ind{font-size:11px;font-family:'SF Mono','Fira Code',monospace;min-width:60px;text-align:right}
  .sync-ind.saving{color:var(--amber)}.sync-ind.saved{color:var(--green)}.sync-ind.error{color:var(--red)}
  .nav{display:flex;gap:6px;margin-bottom:2rem;flex-wrap:wrap}
  .nb{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
  .nb:hover{border-color:var(--text);color:var(--text)}
  .nb.active{background:var(--text);color:#fff;border-color:var(--text)}
  .sec{display:none}.sec.active{display:block}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.75rem}
  .met{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem}
  .ml{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-family:'SF Mono','Fira Code',monospace}
  .mv{font-size:1.5rem;font-weight:normal;letter-spacing:-.02em}
  .ms{font-size:11px;color:var(--text3);margin-top:2px}
  .alert{background:var(--amber-bg);border:1px solid rgba(138,90,0,.2);border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:8px;font-size:13px;color:var(--amber);display:flex;align-items:center;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:10px}
  .ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .cn{font-size:14px;font-weight:bold;letter-spacing:-.01em}
  .co{font-size:11px;color:var(--text3);margin-top:2px;font-family:'SF Mono','Fira Code',monospace}
  .row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
  .row:last-of-type{border-bottom:none}
  .rl{color:var(--text2)}.rv{font-weight:bold;font-size:13px}
  .bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:bold;font-family:'SF Mono','Fira Code',monospace}
  .bok{background:var(--green-bg);color:var(--green)}
  .bwarn{background:var(--amber-bg);color:var(--amber)}
  .bdng{background:var(--red-bg);color:var(--red)}
  .binfo{background:var(--blue-bg);color:var(--blue)}
  .bgray{background:var(--surface2);color:var(--text2)}
  .owner-cason{border-left:4px solid #2563eb}
  .owner-ellerie{border-left:4px solid #9333ea}
  .tag-cason{background:#eff6ff;color:#1d4ed8}
  .tag-ellerie{background:#faf5ff;color:#7e22ce}
  input,select,textarea{width:100%;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:var(--text)}
  select{cursor:pointer}
  .note{font-size:11px;color:var(--text3);margin-top:4px;font-family:'SF Mono','Fira Code',monospace}
  .btn{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
  .btn:hover{background:var(--surface2)}
  .btnp{background:var(--text);color:#fff;border-color:var(--text)}
  .btnp:hover{opacity:.85}
  .btnd{border-color:rgba(184,50,50,.3);color:var(--red)}
  .btnd:hover{background:var(--red-bg)}
  .theme-toggle{background:transparent;border:1px solid var(--border2);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
  .theme-toggle:hover{border-color:var(--text);color:var(--text)}
  .stitle{font-size:1.05rem;font-weight:normal;margin-bottom:1.1rem;letter-spacing:-.01em}
  .pbar-wrap{background:var(--surface2);border-radius:20px;height:5px;margin:7px 0 4px;overflow:hidden}
  .pbar{height:5px;border-radius:20px;background:var(--text);transition:width .4s ease}
  .pbar.done{background:var(--green)}
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{font-size:11px;color:var(--text3);font-weight:normal;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;font-family:'SF Mono','Fira Code',monospace}
  .tbl td{padding:8px;border-bottom:1px solid var(--border)}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr:hover td{background:var(--surface2)}
  .rg{color:var(--green);font-weight:bold}.rw{color:var(--amber);font-weight:bold}
  .tab-inner{display:flex;gap:6px;margin-bottom:1.1rem;flex-wrap:wrap}
  .tab-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
  .tab-btn.active{background:var(--surface2);color:var(--text);border-color:var(--text)}
  .preview-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;margin:8px 0;display:none;border-left:3px solid var(--text)}
  .preview-box.show{display:block}
  .preview-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
  .preview-label{color:var(--text2)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .flabel{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-family:'SF Mono','Fira Code',monospace}
  .tbl-wrap{overflow-x:auto}
  @media(max-width:600px){.g2{grid-template-columns:1fr}.mgrid{grid-template-columns:repeat(2,1fr)}.app{padding:1rem 1rem 3rem}}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-title">Miles Tracker</div>
    <div class="login-sub" id="loginSub">Sign in to your account</div>
    <div class="login-err" id="loginErr"></div>
    <div class="login-field">
      <label class="login-label">Email</label>
      <input id="loginEmail" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input id="loginPw" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <div class="login-field" id="loginConfirmWrap" style="display:none">
      <label class="login-label">Confirm password</label>
      <input id="loginPwConfirm" type="password" placeholder="Confirm password">
    </div>
    <button class="btn btnp" style="width:100%;margin-top:4px;padding:9px" id="loginBtn" onclick="authAction()">Sign in</button>
    <div class="login-mode">
      <span id="loginModeText">Don't have an account?</span>
      <a onclick="toggleAuthMode()"> <span id="loginModeLink">Register</span></a>
    </div>
  </div>
</div>

<div id="appScreen" style="display:none">
  <div class="app">
    <div class="app-header">
      <div class="app-title">Miles Tracker <span>/ Cason & Ellerie</span></div>
      <div class="header-right">
        <span class="sync-ind" id="syncStatus"></span>
        <span class="user-pill" id="userEmail"></span>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()"><span id="themeIcon">🌙</span><span id="themeLabel">Dark</span></button>
        <button class="btn" style="font-size:12px;padding:4px 10px" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div class="nav">
      <button class="nb active" onclick="show('dashboard')">Dashboard</button>
      <button class="nb" onclick="show('cards')">CC points</button>
      <button class="nb" onclick="show('miles')">Miles</button>
      <button class="nb" onclick="show('goals')">Goals</button>
      <button class="nb" onclick="show('convert')">Convert</button>
      <button class="nb" onclick="show('log')">Log</button>
      <button class="nb" onclick="show('chart')">Award chart</button>
    </div>
    <div id="dashboard" class="sec active"></div>
    <div id="cards" class="sec"></div>
    <div id="miles" class="sec"></div>
    <div id="goals" class="sec"></div>
    <div id="convert" class="sec"></div>
    <div id="log" class="sec"></div>
    <div id="chart" class="sec"></div>
  </div>
</div>

<script>
const SURL='https://pirxfzwhjfedheeasenc.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpcnhmendoamZlZGhlZWFzZW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTA2MjksImV4cCI6MjA5MjA4NjYyOX0.uSYJyC9v6xQD4IBNDtVcPkUe5RAE6D8v7vBEF467wFc';
const sb=supabase.createClient(SURL,SKEY);

const CARDS=[
  {id:'ocbc',     name:'OCBC Rewards',      owner:'Cason',   cur:'OCBC$',  kf:0.4,  cm:0.29,note:'25,000 OCBC$ = 10,000 KF miles · Asia Miles lower (~0.29x), prefer KF'},
  {id:'hsbc_rev', name:'HSBC Revolution',    owner:'Ellerie', cur:'Points', kf:0.33, cm:0.4, note:'30,000 pts = 10,000 KF miles · Asia Miles better at 0.4x'},
  {id:'uob',      name:'UOB (pooled UNI$)',  owner:'Ellerie', cur:'UNI$',   kf:2.0,  cm:2.0, note:'Pooled: Ladies Solitaire & Preferred Platinum · 1 UNI$ = 2 miles (blocks of 10,000)'},
  {id:'citi_rwd', name:'Citi Rewards',       owner:'Ellerie', cur:'Points', kf:0.4,  cm:0.4, note:'2,500 pts = 1,000 miles'},
  {id:'citi_pm',  name:'Citi PremierMiles',  owner:'Ellerie', cur:'Miles',  kf:1.0,  cm:0.8, note:'1 Citi Mile = 1 KF or 0.8 Asia Miles'}
];
const PROGS=[{id:'kf',name:'KrisFlyer',airline:'Singapore Airlines'},{id:'cm',name:'Asia Miles',airline:'Cathay Pacific'}];
const ZONES=[
  {id:'z2', label:'Malaysia / Indonesia / Brunei',      eg:'KL, Bali, Jakarta',             pe_saver:null, biz_saver:22,   biz_adv:34},
  {id:'z3', label:'SE Asia (Thailand, Vietnam, PH)',     eg:'Bangkok, Ho Chi Minh, Manila',  pe_saver:null, biz_saver:25,   biz_adv:38},
  {id:'z4', label:'South China / HK / Taiwan',          eg:'Hong Kong, Taipei, Guangzhou',  pe_saver:28,   biz_saver:35.5, biz_adv:52},
  {id:'z5', label:'North China (Beijing / Shanghai)',    eg:'Beijing, Shanghai',             pe_saver:36,   biz_saver:45,   biz_adv:65},
  {id:'z6', label:'South Asia (India / Maldives / SL)', eg:'Mumbai, Delhi, Male',           pe_saver:36,   biz_saver:45,   biz_adv:65},
  {id:'z7', label:'Japan / South Korea',                eg:'Tokyo, Osaka, Seoul',           pe_saver:39.5, biz_saver:54.5, biz_adv:81},
  {id:'z8', label:'Australia — Perth / Darwin',         eg:'Perth, Darwin',                 pe_saver:null, biz_saver:42.5, biz_adv:62},
  {id:'z9', label:'Australia (Others) / New Zealand',   eg:'Sydney, Melbourne, Auckland',   pe_saver:53.5, biz_saver:72,   biz_adv:105},
  {id:'z10',label:'Middle East / Africa / Turkey',      eg:'Dubai, Istanbul, Johannesburg', pe_saver:51.5, biz_saver:68,   biz_adv:92},
  {id:'z11',label:'Europe',                             eg:'London, Paris, Frankfurt',      pe_saver:74.5, biz_saver:108.5,biz_adv:155},
];

function mkDefault(){
  const cb={};
  const defs={ocbc:118003,hsbc_rev:1191,uob:69283,citi_rwd:155858,citi_pm:80623};
  CARDS.forEach(c=>{cb[c.id]={bal:defs[c.id]||0,upd:'2026-04-18'};});
  const mb={};PROGS.forEach(p=>{mb[p.id]={bal:0,exp:'',upd:td()};});
  return{cb,mb,goals:[],log:[]};
}
let S=mkDefault();
let saveTimer=null;

function td(){return new Date().toISOString().split('T')[0];}
function fmtN(n){return Math.round(n).toLocaleString();}
function daysTo(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const t=new Date(d);t.setHours(0,0,0,0);return Math.round((t-n)/86400000);}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});}
function totalKF(){return CARDS.reduce((s,c)=>s+(S.cb[c.id].bal||0)*c.kf,0);}
function totalCM(){return CARDS.reduce((s,c)=>s+(S.cb[c.id].bal||0)*c.cm,0);}

function setSync(cls,msg){const el=document.getElementById('syncStatus');if(el){el.className='sync-ind '+cls;el.textContent=msg;}}

async function loadDB(){
  setSync('saving','Loading...');
  try{
    const{data,error}=await sb.from('tracker_data').select('key,value');
    if(error)throw error;
    if(!data||!data.length){S=mkDefault();setSync('saved','Ready');return;}
    const m=mkDefault();
    data.forEach(r=>{
      if(r.key==='cb')Object.assign(m.cb,r.value);
      else if(r.key==='mb')Object.assign(m.mb,r.value);
      else if(r.key==='goals')m.goals=r.value;
      else if(r.key==='log')m.log=r.value;
    });
    S=m;setSync('saved','Synced');setTimeout(()=>setSync('',''),2000);
  }catch(e){console.error(e);setSync('error','Offline');}
}

async function saveDB(key,val){
  setSync('saving','Saving...');
  try{
    const{error}=await sb.from('tracker_data').upsert({key,value:val,updated_at:new Date().toISOString()},{onConflict:'key'});
    if(error)throw error;
    setSync('saved','Saved');setTimeout(()=>setSync('',''),2000);
  }catch(e){console.error(e);setSync('error','Save failed');}
}

function qsave(key,val){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveDB(key,val),600);}
function saveAll(){saveDB('cb',S.cb);saveDB('mb',S.mb);saveDB('goals',S.goals);saveDB('log',S.log);}

/* AUTH */
let authMode='signin';
function toggleAuthMode(){
  authMode=authMode==='signin'?'register':'signin';
  const si=authMode==='signin';
  document.getElementById('loginSub').textContent=si?'Sign in to your account':'Create a new account';
  document.getElementById('loginBtn').textContent=si?'Sign in':'Register';
  document.getElementById('loginModeText').textContent=si?'Don\'t have an account?':'Already have an account?';
  document.getElementById('loginModeLink').textContent=si?'Register':'Sign in';
  document.getElementById('loginConfirmWrap').style.display=si?'none':'block';
  const e=document.getElementById('loginErr');e.classList.remove('show','err','ok');
}

function showErr(msg,isOk){
  const e=document.getElementById('loginErr');
  e.textContent=msg;e.className='login-err show '+(isOk?'ok':'err');
}

async function authAction(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(!email||!pw){showErr('Please enter email and password.');return;}
  const btn=document.getElementById('loginBtn');
  btn.textContent='Please wait...';btn.disabled=true;
  try{
    if(authMode==='register'){
      const c=document.getElementById('loginPwConfirm').value;
      if(pw!==c){showErr('Passwords do not match.');return;}
      const{error}=await sb.auth.signUp({email,password:pw});
      if(error)throw error;
      showErr('Account created! You can now sign in.',true);
      setTimeout(()=>toggleAuthMode(),1500);
    } else {
      const{error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
    }
  }catch(e){showErr(e.message||'Authentication failed.');}
  finally{btn.textContent=authMode==='signin'?'Sign in':'Register';btn.disabled=false;}
}

async function signOut(){
  await sb.auth.signOut();
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginPw').value='';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')authAction();
});

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    document.getElementById('userEmail').textContent=session.user.email;
    await loadDB();
    render();
  } else {
    document.getElementById('appScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
  }
});

/* NAV */
const NLABELS={dashboard:'Dashboard',cards:'CC points',miles:'Miles',goals:'Goals',convert:'Convert',log:'Log',chart:'Award chart'};
function show(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b=>{if(b.textContent===NLABELS[id])b.classList.add('active');});
  render();
}
function render(){rDash();rCards();rMiles();rGoals();rConvert();rLog();rChart();}

/* DASHBOARD */
function rDash(){
  const el=document.getElementById('dashboard');
  const alerts=[];
  PROGS.forEach(p=>{const d=daysTo(S.mb[p.id].exp);if(d!==null&&d<=90)alerts.push({name:p.name,days:d,bal:S.mb[p.id].bal});});
  const kfB=S.mb.kf.bal||0,cmB=S.mb.cm.bal||0;
  const done=S.goals.filter(g=>(g.prog==='kf'?kfB:cmB)>=g.target).length;
  let h=`<div class="mgrid">
    <div class="met"><div class="ml">KrisFlyer</div><div class="mv">${fmtN(kfB)}</div><div class="ms">miles</div></div>
    <div class="met"><div class="ml">Asia Miles</div><div class="mv">${fmtN(cmB)}</div><div class="ms">miles</div></div>
    <div class="met"><div class="ml">Convertible est.</div><div class="mv">${fmtN(totalKF())}</div><div class="ms">→ KrisFlyer</div></div>
    <div class="met"><div class="ml">Goals</div><div class="mv">${done}/${S.goals.length}</div><div class="ms">completed</div></div>
    <div class="met"><div class="ml">Expiry alerts</div><div class="mv" style="color:${alerts.length?'var(--amber)':'var(--green)'}">${alerts.length}</div><div class="ms">${alerts.length?'within 90 days':'all clear'}</div></div>
  </div>`;
  alerts.forEach(a=>{h+=`<div class="alert">⚠ <span><strong>${a.name}</strong> — ${fmtN(a.bal)} miles expiring in <strong>${a.days} day${a.days!==1?'s':''}</strong></span></div>`;});
  const active=S.goals.filter(g=>(g.prog==='kf'?kfB:cmB)<g.target);
  if(active.length){
    h+=`<div class="stitle" style="margin-top:1.5rem">Active goals</div>`;
    active.slice(0,3).forEach(g=>{
      const bal=g.prog==='kf'?kfB:cmB,pct=Math.min(100,Math.round((bal/g.target)*100)),need=Math.max(0,g.target-bal);
      h+=`<div class="card" style="padding:.9rem 1.1rem;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px"><span style="font-size:13px;font-weight:bold">${g.name}</span><span class="bdg ${pct>=100?'bok':'binfo'}">${pct}%</span></div>
        <div class="pbar-wrap"><div class="pbar ${pct>=100?'done':''}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--text3);font-family:'SF Mono','Fira Code',monospace">${fmtN(bal)} / ${fmtN(g.target)} ${g.prog==='kf'?'KF':'Asia'} miles${need>0?' · need '+fmtN(need)+' more':''}</div>
      </div>`;
    });
  }
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:1.5rem">
    <button class="btn" onclick="show('cards')">Update CC points</button>
    <button class="btn" onclick="show('miles')">Update miles</button>
    <button class="btn" onclick="show('goals')">Manage goals</button>
    <button class="btn" onclick="show('chart')">Award chart</button>
  </div>`;
  el.innerHTML=h;
}

/* CC POINTS */
function rCards(){
  const el=document.getElementById('cards');
  function ch(c){
    const d=S.cb[c.id],estKF=Math.round((d.bal||0)*c.kf);
    const oc=c.owner==='Cason'?'owner-cason':'owner-ellerie',tc=c.owner==='Cason'?'tag-cason':'tag-ellerie';
    return `<div class="card ${oc}">
      <div class="ch"><div><div class="cn">${c.name}</div><div class="co" style="margin-top:3px"><span class="bdg ${tc}" style="font-size:10px;padding:1px 7px">${c.owner}</span></div></div><span class="bdg binfo">${c.cur}</span></div>
      <div class="row"><span class="rl">Balance</span><span class="rv">${fmtN(d.bal||0)}</span></div>
      <div class="row"><span class="rl">→ KrisFlyer est.</span><span class="rv rg">${fmtN(estKF)} miles</span></div>
      <div class="row"><span class="rl">Last updated</span><span class="rv" style="color:var(--text3)">${fmtDate(d.upd)}</span></div>
      <div style="margin-top:12px;display:flex;gap:6px"><input id="cb_${c.id}" type="number" min="0" placeholder="New balance" style="flex:1"><button class="btn btnp" onclick="updCard('${c.id}')">Save</button></div>
      <div class="note">${c.note}</div>
    </div>`;
  }
  let h=`<div class="stitle">Credit card points</div>`;
  h+=`<div style="font-size:11px;font-weight:600;color:#1d4ed8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Cason</div>`;
  CARDS.filter(c=>c.owner==='Cason').forEach(c=>{h+=ch(c);});
  h+=`<div style="font-size:11px;font-weight:600;color:#7e22ce;text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px">Ellerie</div>`;
  CARDS.filter(c=>c.owner==='Ellerie').forEach(c=>{h+=ch(c);});
  el.innerHTML=h;
}

function updCard(id){
  const v=parseFloat(document.getElementById('cb_'+id).value);
  if(!isNaN(v)&&v>=0){S.cb[id]={bal:v,upd:td()};document.getElementById('cb_'+id).value='';qsave('cb',S.cb);render();}
}

/* MILES */
function rMiles(){
  const el=document.getElementById('miles');
  let h=`<div class="stitle">Miles balances</div>`;
  PROGS.forEach(p=>{
    const d=S.mb[p.id],days=daysTo(d.exp);
    let bc='binfo',bt='No expiry set';
    if(days!==null){if(days<=30){bc='bdng';bt=days+'d left';}else if(days<=90){bc='bwarn';bt=days+'d left';}else{bc='bok';bt=days+'d left';}}
    h+=`<div class="card">
      <div class="ch"><div><div class="cn">${p.name}</div><div class="co">${p.airline}</div></div><span class="bdg ${bc}">${bt}</span></div>
      <div style="font-size:1.4rem;font-weight:normal;letter-spacing:-.02em;margin-bottom:3px">${fmtN(d.bal||0)} miles</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:14px;font-family:'SF Mono','Fira Code',monospace">${d.exp?'Expires '+fmtDate(d.exp):'Set an expiry date below'}</div>
      <div class="g2" style="margin-bottom:10px">
        <div><div class="flabel">Balance</div><input id="mb_${p.id}" type="number" min="0" placeholder="${fmtN(d.bal||0)}"></div>
        <div><div class="flabel">Expiry date</div><input id="me_${p.id}" type="date" value="${d.exp||''}"></div>
      </div>
      <button class="btn btnp" style="width:100%" onclick="updMiles('${p.id}')">Save</button>
    </div>`;
  });
  el.innerHTML=h;
}

function updMiles(id){
  const v=parseFloat(document.getElementById('mb_'+id).value),e=document.getElementById('me_'+id).value;
  if(!isNaN(v)&&v>=0)S.mb[id].bal=v;
  if(e)S.mb[id].exp=e;
  S.mb[id].upd=td();qsave('mb',S.mb);render();
}

/* GOALS */
function rGoals(){
  const el=document.getElementById('goals'),kfB=S.mb.kf.bal||0,cmB=S.mb.cm.bal||0;
  let h=`<div class="stitle">Redemption goals</div>
  <div class="card" style="margin-bottom:1.5rem">
    <div style="font-size:13px;font-weight:bold;margin-bottom:12px">Add a new goal</div>
    <div style="display:grid;gap:10px">
      <div><div class="flabel">Goal name</div><input id="g_name" placeholder="e.g. Business class to Tokyo"></div>
      <div class="g2">
        <div><div class="flabel">Programme</div><select id="g_prog"><option value="kf">KrisFlyer</option><option value="cm">Asia Miles</option></select></div>
        <div><div class="flabel">Miles needed</div><input id="g_target" type="number" min="1000" placeholder="e.g. 108500"></div>
      </div>
      <div><div class="flabel">Note (optional)</div><input id="g_note" placeholder="e.g. 2 pax, Saver, London return"></div>
      <button class="btn btnp" onclick="addGoal()">Add goal</button>
    </div>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:1.1rem">Use the <button class="btn" style="padding:2px 10px;font-size:12px" onclick="show('chart')">Award chart</button> tab to look up miles needed.</p>`;
  if(!S.goals.length){h+=`<p style="text-align:center;padding:2.5rem;color:var(--text3);font-size:13px">No goals yet.</p>`;}
  else S.goals.forEach((g,i)=>{
    const bal=g.prog==='kf'?kfB:cmB,pct=Math.min(100,Math.round((bal/g.target)*100)),need=Math.max(0,g.target-bal),done=pct>=100;
    h+=`<div class="card">
      <div class="ch">
        <div><div class="cn">${g.name}</div><div class="co">${g.prog==='kf'?'KrisFlyer':'Asia Miles'}${g.note?' · '+g.note:''}</div></div>
        <div style="display:flex;gap:6px;align-items:center"><span class="bdg ${done?'bok':'binfo'}">${pct}%</span><button class="btn btnd" style="padding:3px 10px;font-size:11px" onclick="delGoal(${i})">Remove</button></div>
      </div>
      <div class="pbar-wrap"><div class="pbar ${done?'done':''}" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:5px">
        <span>${fmtN(bal)} / ${fmtN(g.target)} miles</span>
        <span>${done?'<span style="color:var(--green);font-weight:bold">Ready to redeem!</span>':'Need '+fmtN(need)+' more'}</span>
      </div>
    </div>`;
  });
  el.innerHTML=h;
}
function addGoal(){
  const name=document.getElementById('g_name').value.trim(),prog=document.getElementById('g_prog').value,target=parseFloat(document.getElementById('g_target').value),note=document.getElementById('g_note').value.trim();
  if(!name||isNaN(target)||target<1)return;
  S.goals.push({name,prog,target,note,created:td()});qsave('goals',S.goals);render();
}
function delGoal(i){S.goals.splice(i,1);qsave('goals',S.goals);render();}

/* CONVERT */
function rConvert(){
  const el=document.getElementById('convert');
  let h=`<div class="stitle">Conversion rates & recommendations</div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Card</th><th>Owner</th><th>Balance</th><th>→ KF</th><th>→ AM</th><th>Est. KF miles</th><th>Priority</th></tr></thead><tbody>`;
  [...CARDS].sort((a,b)=>b.kf-a.kf).forEach(c=>{
    const bal=S.cb[c.id].bal||0,estKF=Math.round(bal*c.kf);
    const kc=c.kf>=2?'rg':c.kf>=1?'rw':'';
    const pri=c.kf>=2?'<span class="bdg bok">Convert first</span>':c.kf>=1?'<span class="bdg binfo">When needed</span>':'<span class="bdg bgray">Minimise fees</span>';
    const ot=c.owner==='Cason'?'<span class="bdg tag-cason" style="font-size:10px">Cason</span>':'<span class="bdg tag-ellerie" style="font-size:10px">Ellerie</span>';
    h+=`<tr><td style="font-weight:bold">${c.name}</td><td>${ot}</td><td>${fmtN(bal)}</td><td class="${kc}">${c.kf}x</td><td style="color:var(--text2)">${c.cm}x</td><td style="font-weight:bold">${fmtN(estKF)}</td><td>${pri}</td></tr>`;
  });
  const tKF=Math.round(totalKF()),tCM=Math.round(totalCM());
  h+=`<tr style="border-top:2px solid var(--border2)"><td colspan="5" style="font-weight:bold;padding-top:10px">Total if all converted</td><td style="font-weight:bold">${fmtN(tKF)} KF</td><td style="color:var(--text2)">${fmtN(tCM)} AM</td></tr></tbody></table></div>
  <p style="margin-top:.6rem;font-size:11px;color:var(--text3);font-family:'SF Mono','Fira Code',monospace">Transfer fees may apply. Rates as of Apr 2026.</p>
  <div style="margin-top:2rem"><div class="stitle">Log a conversion</div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:1rem;font-family:'SF Mono','Fira Code',monospace">Points deducted and miles credited automatically on confirm.</p>
  <div class="card">
    <div class="g2" style="margin-bottom:10px">
      <div><div class="flabel">From card</div><select id="lc_card">${CARDS.map(c=>`<option value="${c.id}">${c.name} (${fmtN(S.cb[c.id].bal||0)} ${c.cur})</option>`).join('')}</select></div>
      <div><div class="flabel">To programme</div><select id="lc_prog"><option value="kf">KrisFlyer</option><option value="cm">Asia Miles</option></select></div>
    </div>
    <div class="g2" style="margin-bottom:10px">
      <div><div class="flabel">Points to convert</div><input id="lc_pts" type="number" min="1" placeholder="e.g. 10000"></div>
      <div><div class="flabel">Miles received</div><input id="lc_miles" type="number" min="1" placeholder="auto-calculated"></div>
    </div>
    <div style="margin-bottom:12px"><div class="flabel">Date</div><input id="lc_date" type="date" value="${td()}"></div>
    <div class="preview-box" id="conv_preview">
      <div style="font-size:11px;font-weight:bold;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-family:'SF Mono','Fira Code',monospace">What will happen</div>
      <div class="preview-row"><span class="preview-label" id="prev_card_label">Card</span><span id="prev_card_val" style="font-size:13px"></span></div>
      <div class="preview-row"><span class="preview-label" id="prev_miles_label">Miles</span><span id="prev_miles_val" style="font-size:13px"></span></div>
    </div>
    <button class="btn btnp" style="width:100%;margin-top:10px" onclick="logConv()">Confirm conversion</button>
  </div></div>`;
  el.innerHTML=h;
  function upPrev(){
    const cid=document.getElementById('lc_card').value,prog=document.getElementById('lc_prog').value,pts=parseFloat(document.getElementById('lc_pts').value);
    const card=CARDS.find(c=>c.id===cid);
    if(!card||isNaN(pts)||pts<=0){document.getElementById('conv_preview').classList.remove('show');return;}
    const rate=prog==='kf'?card.kf:card.cm,miles=Math.round(pts*rate);
    document.getElementById('lc_miles').value=miles;
    const cb=S.cb[cid].bal||0,nb=Math.max(0,cb-pts),cm2=S.mb[prog].bal||0,nm=cm2+miles;
    document.getElementById('prev_card_label').textContent=card.name;
    document.getElementById('prev_card_val').innerHTML=`${fmtN(cb)} → <strong style="color:var(--red)">${fmtN(nb)}</strong> ${card.cur}`;
    document.getElementById('prev_miles_label').textContent=prog==='kf'?'KrisFlyer':'Asia Miles';
    document.getElementById('prev_miles_val').innerHTML=`${fmtN(cm2)} → <strong style="color:var(--green)">${fmtN(nm)}</strong> miles`;
    document.getElementById('conv_preview').classList.add('show');
  }
  document.getElementById('lc_pts').addEventListener('input',upPrev);
  document.getElementById('lc_card').addEventListener('change',()=>{document.getElementById('lc_pts').value='';document.getElementById('conv_preview').classList.remove('show');upPrev();});
  document.getElementById('lc_prog').addEventListener('change',upPrev);
}

function logConv(){
  const cid=document.getElementById('lc_card').value,prog=document.getElementById('lc_prog').value;
  const pts=parseFloat(document.getElementById('lc_pts').value),miles=parseFloat(document.getElementById('lc_miles').value);
  const date=document.getElementById('lc_date').value||td();
  if(isNaN(pts)||pts<=0||isNaN(miles)||miles<=0)return;
  const card=CARDS.find(c=>c.id===cid);
  S.cb[cid].bal=Math.max(0,(S.cb[cid].bal||0)-pts);S.cb[cid].upd=td();
  S.mb[prog].bal=(S.mb[prog].bal||0)+miles;S.mb[prog].upd=td();
  S.log.unshift({date,card:card.name,cardId:cid,owner:card.owner,prog,pts,miles,cur:card.cur});
  saveAll();render();show('log');
}

/* LOG */
function rLog(){
  const el=document.getElementById('log');
  let h=`<div class="stitle">Conversion log</div>`;
  if(!S.log.length){h+=`<p style="text-align:center;padding:2.5rem;color:var(--text3);font-size:13px">No conversions logged yet.</p>`;}
  else{
    const tKF=S.log.filter(l=>l.prog==='kf').reduce((s,l)=>s+l.miles,0),tCM=S.log.filter(l=>l.prog==='cm').reduce((s,l)=>s+l.miles,0);
    h+=`<div class="mgrid" style="margin-bottom:1.5rem">
      <div class="met"><div class="ml">Total → KrisFlyer</div><div class="mv">${fmtN(tKF)}</div><div class="ms">miles converted</div></div>
      <div class="met"><div class="ml">Total → Asia Miles</div><div class="mv">${fmtN(tCM)}</div><div class="ms">miles converted</div></div>
      <div class="met"><div class="ml">Entries</div><div class="mv">${S.log.length}</div><div class="ms">conversions</div></div>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Card</th><th>Owner</th><th>Points out</th><th>Programme</th><th>Miles in</th><th></th></tr></thead><tbody>`;
    S.log.forEach((l,i)=>{
      h+=`<tr><td>${fmtDate(l.date)}</td><td style="font-weight:bold">${l.card}</td><td style="color:var(--text2)">${l.owner}</td>
      <td style="color:var(--red);font-family:'SF Mono','Fira Code',monospace">−${fmtN(l.pts)} ${l.cur}</td>
      <td><span class="bdg ${l.prog==='kf'?'binfo':'bok'}">${l.prog==='kf'?'KrisFlyer':'Asia Miles'}</span></td>
      <td style="color:var(--green);font-weight:bold;font-family:'SF Mono','Fira Code',monospace">+${fmtN(l.miles)}</td>
      <td><button class="btn btnd" style="padding:3px 10px;font-size:11px" onclick="undoLog(${i})">Undo</button></td></tr>`;
    });
    h+=`</tbody></table></div><p style="font-size:11px;color:var(--text3);margin-top:8px;font-family:'SF Mono','Fira Code',monospace">Undo reverses the points deduction and miles credit.</p>`;
  }
  el.innerHTML=h;
}

function undoLog(i){
  const l=S.log[i];
  if(!confirm(`Undo this conversion?\n\n+${fmtN(l.pts)} ${l.cur} back to ${l.card}\n−${fmtN(l.miles)} miles from ${l.prog==='kf'?'KrisFlyer':'Asia Miles'}`))return;
  const card=CARDS.find(c=>c.name===l.card);
  if(card){S.cb[card.id].bal=(S.cb[card.id].bal||0)+l.pts;S.cb[card.id].upd=td();}
  S.mb[l.prog].bal=Math.max(0,(S.mb[l.prog].bal||0)-l.miles);S.mb[l.prog].upd=td();
  S.log.splice(i,1);saveAll();render();
}

/* AWARD CHART */
function rChart(){
  const el=document.getElementById('chart');
  let ct='biz_saver';
  function draw(tab){
    ct=tab;
    let h=`<div class="stitle">KrisFlyer award chart <span style="font-size:12px;font-weight:normal;color:var(--text3)">— effective 1 Nov 2025, one-way from Singapore</span></div>
    <div class="tab-inner">
      <button class="tab-btn ${tab==='biz_saver'?'active':''}" onclick="window._ct('biz_saver')">Business — Saver</button>
      <button class="tab-btn ${tab==='biz_adv'?'active':''}" onclick="window._ct('biz_adv')">Business — Advantage</button>
      <button class="tab-btn ${tab==='pe_saver'?'active':''}" onclick="window._ct('pe_saver')">Premium Economy — Saver</button>
    </div>`;
    if(tab==='pe_saver')h+=`<div style="font-size:12px;color:var(--text2);margin-bottom:.9rem;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm)">Premium Economy is Saver-only — no Advantage option for this cabin.</div>`;
    h+=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Destination</th><th>Examples</th><th style="text-align:right">One-way</th><th style="text-align:right">Return</th><th></th></tr></thead><tbody>`;
    const kfA=(S.mb.kf.bal||0)+totalKF();
    ZONES.forEach(z=>{
      const m=tab==='biz_saver'?z.biz_saver:tab==='biz_adv'?z.biz_adv:z.pe_saver;
      if(m===null){h+=`<tr><td>${z.label}</td><td style="color:var(--text3)">${z.eg}</td><td colspan="3" style="text-align:center;color:var(--text3);font-style:italic">Not available</td></tr>`;return;}
      const n=m*1000,can=kfA>=n;
      h+=`<tr><td style="font-weight:bold">${z.label}</td><td style="color:var(--text3);font-size:12px;font-family:'SF Mono','Fira Code',monospace">${z.eg}</td>
      <td style="text-align:right;font-weight:bold;font-family:'SF Mono','Fira Code',monospace">${fmtN(n)}</td>
      <td style="text-align:right;color:var(--text2);font-family:'SF Mono','Fira Code',monospace">${fmtN(n*2)}</td>
      <td style="text-align:right">${can?'<span class="bdg bok">Can redeem</span>':'<span style="font-size:11px;color:var(--text3)">Need '+fmtN(n-kfA)+' more</span>'}</td></tr>`;
    });
    h+=`</tbody></table></div>
    <p style="margin-top:.7rem;font-size:11px;color:var(--text3);font-family:'SF Mono','Fira Code',monospace">Source: SIA KrisFlyer (1 Nov 2025). Taxes payable separately. Availability not guaranteed.</p>
    <div style="margin-top:2rem"><div class="stitle">Set a goal from this chart</div>
    <div class="card">
      <div class="g2" style="margin-bottom:10px">
        <div><div class="flabel">Destination</div><select id="cg_zone">${ZONES.map(z=>`<option value="${z.id}">${z.label}</option>`).join('')}</select></div>
        <div><div class="flabel">Cabin & award type</div><select id="cg_type"><option value="biz_saver">Business Saver</option><option value="biz_adv">Business Advantage</option><option value="pe_saver">Prem Economy Saver</option></select></div>
      </div>
      <div class="g2" style="margin-bottom:10px">
        <div><div class="flabel">Passengers</div><select id="cg_pax"><option value="1">1 pax — one-way</option><option value="2">2 pax — one-way</option><option value="1rt">1 pax — return</option><option value="2rt">2 pax — return</option></select></div>
        <div><div class="flabel">Goal name</div><input id="cg_name" placeholder="e.g. Tokyo Business x2"></div>
      </div>
      <button class="btn btnp" style="width:100%" onclick="goalFromChart()">Add as goal</button>
    </div></div>`;
    el.innerHTML=h;
  }
  window._ct=draw;draw(ct);
}

window.goalFromChart=function(){
  const zid=document.getElementById('cg_zone').value,type=document.getElementById('cg_type').value,pax=document.getElementById('cg_pax').value;
  const name=document.getElementById('cg_name').value.trim()||'New goal';
  const z=ZONES.find(z=>z.id===zid);if(!z)return;
  const base=type==='biz_saver'?z.biz_saver:type==='biz_adv'?z.biz_adv:z.pe_saver;if(!base)return;
  const rt=pax.endsWith('rt'),num=parseInt(pax);
  S.goals.push({name,prog:'kf',target:base*1000*(rt?2:1)*num,note:`${type.replace('_',' ')}${rt?' return':' one-way'}, ${num} pax`,created:td()});
  qsave('goals',S.goals);render();show('goals');
};

/* THEME */
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark',next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeIcon').textContent=next==='dark'?'☀️':'🌙';
  document.getElementById('themeLabel').textContent=next==='dark'?'Light':'Dark';
  try{localStorage.setItem('miles_theme',next);}catch(e){}
}
(function(){
  try{
    const s=localStorage.getItem('miles_theme');
    if(s==='dark'){
      document.documentElement.setAttribute('data-theme','dark');
      window.addEventListener('DOMContentLoaded',()=>{
        const ic=document.getElementById('themeIcon'),lb=document.getElementById('themeLabel');
        if(ic)ic.textContent='☀️';if(lb)lb.textContent='Light';
      });
    }
  }catch(e){}
})();
</script>
</body>
</html>
